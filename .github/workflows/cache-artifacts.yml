# Caches artifacts, including NPM dependencies, to speed up build times
name: Caching Atrifacts
on: push
jobs:
  build:
    runs-on: [self-hosted]
    container:
      image: ubuntu:24.04
    steps:
    - uses: actions/cache@v2
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
